services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: uncomplex
      POSTGRES_USER: uncomplex
      POSTGRES_PASSWORD: uncomplex
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uncomplex"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/uncomplex
      DB_USERNAME: uncomplex
      DB_PASSWORD: uncomplex
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8080:8080"

volumes:
  pgdata:
