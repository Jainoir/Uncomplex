spring:
  application:
    name: uncomplex
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/uncomplex}
    username: ${DB_USERNAME:uncomplex}
    password: ${DB_PASSWORD:uncomplex}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    redis:
      # Redis is optional (only used when app.rate-limit.store=redis); don't fail
      # the health probe when it isn't part of the deployment.
      enabled: ${REDIS_HEALTH_ENABLED:false}

app:
  ai:
    # "mock" runs without any API key; set to "anthropic" (plus ANTHROPIC_API_KEY) for real generation
    provider: ${AI_PROVIDER:mock}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: claude-opus-4-8
      max-output-tokens: 16000
  generation:
    min-prerequisites: 4
    max-prerequisites: 8
    max-resources-per-prerequisite: 2
    max-attempts: 2
  rate-limit:
    generations-per-day: ${GENERATIONS_PER_DAY:10}
    # "memory" (single instance) or "redis" (shared across replicas)
    store: ${RATE_LIMIT_STORE:memory}
  link-health:
    enabled: ${LINK_HEALTH_ENABLED:true}
    cron: "0 0 4 * * *"
  cors:
    # Comma-separated origins of the deployed frontend; localhost:5173 is the Vite dev server
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  security:
    # HS256 secret, minimum 32 bytes. The default is for local development only —
    # always set JWT_SECRET in any deployed environment.
    jwt-secret: ${JWT_SECRET:local-dev-only-secret-0123456789abcdefghij}
    token-ttl-minutes: ${TOKEN_TTL_MINUTES:60}
    refresh-token-ttl-days: ${REFRESH_TOKEN_TTL_DAYS:30}
  credibility:
    allowed-domains:
      - developer.mozilla.org
      - docs.oracle.com
      - dev.java
      - spring.io
      - docs.spring.io
      - learn.microsoft.com
      - kubernetes.io
      - docs.docker.com
      - docker.com
      - postgresql.org
      - redis.io
      - nginx.org
      - github.com
      - aws.amazon.com
      - cloud.google.com
      - developers.google.com
      - web.dev
      - datatracker.ietf.org
      - www.rfc-editor.org
      - owasp.org
      - martinfowler.com
      - microservices.io
