# Local development without Docker/PostgreSQL: in-memory H2 in PostgreSQL compatibility mode.
# Run with: --spring.profiles.active=local
spring:
  datasource:
    url: jdbc:h2:mem:uncomplex;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
